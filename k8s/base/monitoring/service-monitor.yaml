apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: aegis-earth-monitor
  labels:
    release: prometheus
spec:
  selector:
    matchLabels:
      app.kubernetes.io/component: backend
  endpoints:
    - port: http
      path: /api/v1/system/metrics
      interval: 15s
      scrapeTimeout: 10s
