apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: aegis-earth-ingress
spec:
  rules:
    - host: "api.aegis-earth.com"
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 8000
    - host: "www.aegis-earth.com"
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80
