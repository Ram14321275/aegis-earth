environment: "production"

backend:
  replicaCount: 3
  hpa:
    enabled: true
  pdb:
    enabled: true
    minAvailable: 2

frontend:
  replicaCount: 3
  hpa:
    enabled: true
  pdb:
    enabled: true
    minAvailable: 2

ingress:
  hosts:
    - host: api.aegis-earth.com
      paths:
        - path: /
          pathType: Prefix
          service: backend
    - host: www.aegis-earth.com
      paths:
        - path: /
          pathType: Prefix
          service: frontend
