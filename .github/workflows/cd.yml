name: Continuous Deployment

on:
  push:
    branches: [ "main" ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/backend

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile.prod
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile.prod
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/frontend:${{ steps.meta.outputs.version }}

  deploy-staging:
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4
      
      # Mocked deployment steps - would use actual kubeconfig in reality
      - name: Deploy to Staging via Helm
        run: |
          echo "helm upgrade --install aegis-earth ./helm/aegis-earth -f ./helm/aegis-earth/values-staging.yaml --set backend.image.tag=${{ needs.build-and-push.outputs.image_tag }} --namespace staging --create-namespace"
          
      - name: Run Migration Safety Checks
        run: |
          echo "Running database migrations against staging..."

  deploy-production:
    needs: deploy-staging
    runs-on: ubuntu-latest
    environment: 
      name: production
      url: https://api.aegis-earth.com
    steps:
      - uses: actions/checkout@v4
      
      # Mocked deployment steps
      - name: Deploy to Production via Helm
        run: |
          echo "helm upgrade --install aegis-earth ./helm/aegis-earth -f ./helm/aegis-earth/values-prod.yaml --set backend.image.tag=${{ needs.build-and-push.outputs.image_tag }} --namespace production"
          
      - name: Verify Production Rollout
        run: |
          echo "kubectl rollout status deployment/aegis-earth-backend -n production"

  rollback-production:
    runs-on: ubuntu-latest
    if: failure()
    needs: deploy-production
    steps:
      - name: Rollback Production
        run: |
          echo "helm rollback aegis-earth 0 -n production"
