name: Continuous Integration

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r backend/requirements.txt
        pip install pytest pytest-asyncio bandit

    - name: Run Python Linter & Security (Bandit)
      run: |
        bandit -r backend/app -c backend/bandit.yaml || echo "Warning only for now"

    - name: Run Python Tests
      run: |
        cd backend && python -m pytest app/tests/

    - name: Set up Node
      uses: actions/setup-node@v3
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Install Frontend Dependencies
      run: |
        cd frontend && npm ci

    - name: Run NPM Audit
      run: |
        cd frontend && npm audit --audit-level=high

  container-security:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Build Backend Image for Scanning
      run: docker build -t backend:test -f backend/Dockerfile.prod ./backend

    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: 'backend:test'
        format: 'table'
        exit-code: '1'
        ignore-unfixed: true
        vuln-type: 'os,library'
        severity: 'CRITICAL,HIGH'

  validate-infrastructure:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Install Kustomize
      run: curl -s "https://raw.githubusercontent.com/kubernetes-sigs/kustomize/master/hack/install_kustomize.sh" | bash

    - name: Validate Kustomize Base
      run: ./kustomize build k8s/base > /dev/null

    - name: Set up Helm
      uses: azure/setup-helm@v3

    - name: Validate Helm Chart
      run: helm lint helm/aegis-earth
